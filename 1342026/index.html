<!DOCTYPE html>
<html>
<head>
    <title>Practice Page</title>
</head>
<body>

    <header>
        <h1>Online Store</h1>
        <nav>
            <a href="/home">Home</a>
            <a href="/products">Products</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <section class="products">

        <div class="product col-sm-8" id="p1">
            <h2>iPhone 14</h2>
            <span class="price">1000</span>
            <span class="rating">4.5</span>
        </div>

        <div class="product col-sm-8" id="p2">
            <h2>Samsung S23</h2>
            <span class="price">900</span>
            <span class="rating">4.3</span>
        </div>

        <div class="product col-sm-6" id="p3">
            <h2>OnePlus 11</h2>
            <span class="price">850</span>
            <span class="rating">4.4</span>
        </div>

    </section>

    <section class="users">

        <div class="user" data-role="admin">
            <h3>Rahul</h3>
            <p>Email: rahul@example.com</p>
        </div>

        <div class="user" data-role="customer">
            <h3>Amit</h3>
            <p>Email: amit@example.com</p>
        </div>

        <div class="user" data-role="customer">
            <h3>Sneha</h3>
            <p>Email: sneha@example.com</p>
        </div>

    </section>

    <footer>
        <p>© 2026 Online Store</p>
    </footer>

</body>
</html>
